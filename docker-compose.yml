services:
  postgres:
    image: postgres:17.6
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.2.1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    container_name: redis

volumes:
  postgres_data:
  redis_data: